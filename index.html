<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="PromptBox">
<title>PromptBox</title>
<style>
:root {
  --primary: #1a6abf;
  --primary-light: #e8f0fb;
  --primary-dark: #1456a0;
  --bg: #f5f6f8;
  --bg-card: #ffffff;
  --text: #1a1a2e;
  --text-2: #555;
  --text-3: #999;
  --border: #e4e6eb;
  --danger: #e24b4a;
  --success: #1d9e75;
  --radius: 10px;
  --tab-h: 56px;
  --header-h: 52px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; overflow: hidden; overscroll-behavior: none;
  background: var(--bg); font-family: "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif; font-size: 15px; color: var(--text);
}
button { font-family: inherit; cursor: pointer; border: none; background: none; }
input, textarea { font-family: inherit; font-size: 15px; color: var(--text); }
:root { color-scheme: light dark; }

/* Layout */
#app { display: flex; flex-direction: column; height: 100%; height: 100dvh; min-height: 0; overflow: hidden; }
.tab-content { flex: 1; min-height: 0; overflow: hidden; display: none; flex-direction: column; position: relative; }
.tab-content.active { display: flex; }

/* Header */
.header {
  height: var(--header-h); min-height: var(--header-h);
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
  position: relative;
}
.header h1 { font-size: 17px; font-weight: 600; flex: 1; }
.header-btn {
  width: 36px; height: 36px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  color: var(--primary); font-size: 22px; font-weight: 300;
}
.header-btn:active { background: var(--primary-light); }

/* Bottom tabs */
.tabs {
  height: var(--tab-h); min-height: var(--tab-h);
  background: var(--bg-card); border-top: 1px solid var(--border);
  display: flex;
}
.tab-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 3px; color: var(--text-3); font-size: 11px;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab-btn svg { width: 22px; height: 22px; }
.tab-btn.active { color: var(--primary); }

/* Scrollable list area */
.list-area {
  flex: 1; min-height: 0; overflow-y: auto; overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch; touch-action: pan-y; padding: 12px;
}
#file-list, #file-list * {
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

/* Cards */
.card {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); margin-bottom: 8px;
}
.card-row {
  display: flex; align-items: center; padding: 12px 14px; gap: 10px;
  border-bottom: 1px solid var(--border);
}
.card-row:last-child { border-bottom: none; }

/* File item */
.file-item {
  display: flex; align-items: center; padding: 12px 14px; gap: 12px;
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); margin-bottom: 8px;
}
.file-item.checked { border-color: var(--primary); background: var(--primary-light); }
.file-check {
  width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all 0.15s;
}
.file-item.checked .file-check { background: var(--primary); border-color: var(--primary); }
.file-check svg { display: none; }
.file-item.checked .file-check svg { display: block; }
.file-name { flex: 1; font-size: 15px; font-weight: 500; }
.file-meta { font-size: 12px; color: var(--text-3); }
.file-actions { display: flex; gap: 4px; }
.icon-btn {
  width: 32px; height: 32px; border-radius: 6px; display: flex;
  align-items: center; justify-content: center; color: var(--text-2);
}
.icon-btn:active { background: var(--bg); }
.icon-btn svg { width: 18px; height: 18px; }

/* Assemble bar */
.assemble-bar {
  background: var(--bg-card); border-top: 1px solid var(--border);
  padding: 10px 16px; display: flex; align-items: center; gap: 10px;
}
.assemble-bar.hidden { display: none; }
.assemble-count { font-size: 13px; color: var(--text-2); flex: 1; }
.btn-primary {
  background: var(--primary); color: #fff; border-radius: 8px;
  padding: 9px 18px; font-size: 14px; font-weight: 500;
}
.btn-primary:active { background: var(--primary-dark); }
.btn-secondary {
  background: var(--bg); color: var(--text); border-radius: 8px;
  padding: 9px 18px; font-size: 14px; border: 1px solid var(--border);
}
.btn-secondary:active { background: var(--border); }
.btn-danger {
  background: var(--danger); color: #fff; border-radius: 8px;
  padding: 9px 18px; font-size: 14px; font-weight: 500;
}

/* Modal / Sheet */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 100; display: none; align-items: flex-end;
}
.overlay.active { display: flex; }
.sheet {
  background: var(--bg-card); border-radius: 16px 16px 0 0;
  width: 100%; max-height: 90vh; display: flex; flex-direction: column;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.sheet-header {
  display: flex; align-items: center; padding: 16px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.sheet-title { font-size: 16px; font-weight: 600; flex: 1; }
.sheet-close {
  width: 30px; height: 30px; border-radius: 50%; background: var(--bg);
  display: flex; align-items: center; justify-content: center; color: var(--text-2);
  font-size: 18px;
}
.sheet-body { flex: 1; min-height: 0; overflow-y: auto; overscroll-behavior: contain; -webkit-overflow-scrolling: touch; touch-action: pan-y; padding: 14px 16px; }
.sheet-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 10px; }

/* Full screen editor */
.fullscreen {
  position: fixed; inset: 0; background: var(--bg-card);
  z-index: 200; display: none; flex-direction: column;
}
.fullscreen.active { display: flex; }
.editor-header {
  min-height: var(--header-h); background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 12px; gap: 8px;
}
.editor-title-input {
  flex: 1; border: none; outline: none; font-size: 16px; font-weight: 600;
  background: transparent; color: var(--text);
}
.editor-textarea {
  flex: 1; border: none; outline: none; resize: none; padding: 14px 16px;
  font-size: 15px; line-height: 1.7; color: var(--text); background: var(--bg-card);
}

/* Chat */
.chat-model-bar {
  background: var(--bg-card); border-bottom: 1px solid var(--border);
  padding: 8px 14px; display: flex; align-items: center; gap: 8px;
}
.model-select-btn {
  display: flex; align-items: center; gap: 6px; padding: 6px 10px;
  background: var(--bg); border-radius: 8px; border: 1px solid var(--border);
  font-size: 13px; color: var(--text); flex: 1;
}
.chat-messages {
  flex: 1; min-height: 0; overflow-y: auto; overscroll-behavior: contain;
  -webkit-overflow-scrolling: touch; touch-action: pan-y;
  padding: 14px 14px 6px;
}
.msg { margin-bottom: 14px; display: flex; flex-direction: column; }
.msg.user { align-items: flex-end; }
.msg.assistant { align-items: stretch; }
.msg-bubble {
  max-width: 82%; padding: 10px 13px; border-radius: 14px;
  font-size: 14px; line-height: 1.65; white-space: pre-wrap; word-break: break-word;
}
.msg.user .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant .msg-bubble { max-width: 100%; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; border-bottom-left-radius: 4px; }
.msg-time { font-size: 11px; color: var(--text-3); }
.msg-meta {
  display: flex; align-items: center; gap: 8px;
  margin-top: 4px; padding: 0 4px;
}
.msg-copy {
  font-size: 11px; color: var(--text-3); cursor: pointer; padding: 2px 4px; border-radius: 4px;
}
.msg-copy:active { background: var(--bg); }
.msg-copy.copied { color: var(--primary); }
.msg-thinking { color: var(--text-3); font-style: italic; }
.scroll-bottom-btn {
  position: absolute; right: 14px; bottom: 70px; z-index: 20;
  width: 38px; height: 38px; border-radius: 50%;
  display: none; align-items: center; justify-content: center;
  background: var(--primary); color: #fff; box-shadow: 0 4px 14px rgba(26,106,191,0.25);
  font-size: 20px; line-height: 1;
}
.scroll-bottom-btn.show { display: flex; }
.scroll-bottom-btn:active { background: var(--primary-dark); }
.chat-input-area {
  background: var(--bg-card); border-top: 1px solid var(--border);
  padding: 10px 12px; display: flex; gap: 8px; align-items: flex-end;
}
.chat-input {
  flex: 1; border: 1px solid var(--border); border-radius: 10px;
  padding: 9px 12px; font-size: 14px; resize: none; outline: none;
  max-height: 120px; min-height: 38px; line-height: 1.5; background: var(--bg); color: var(--text);
}
.send-btn {
  width: 38px; height: 38px; border-radius: 10px; background: var(--primary);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.send-btn:active { background: var(--primary-dark); }
.send-btn svg { width: 18px; height: 18px; color: #fff; }
.send-btn:disabled { background: var(--border); }

/* History list */
.conv-item {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); margin-bottom: 8px;
  padding: 12px 14px; display: flex; align-items: center; gap: 10px;
}
.conv-item:active { background: var(--primary-light); }
.conv-info { flex: 1; min-width: 0; }
.conv-title { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.conv-meta { font-size: 12px; color: var(--text-3); margin-top: 2px; }
.conv-del { color: var(--text-3); padding: 4px; }

/* Settings */
.setting-section { margin-bottom: 20px; }
.setting-label { font-size: 12px; color: var(--text-3); padding: 0 4px 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.setting-item {
  background: var(--bg-card); border: 1px solid var(--border);
  display: flex; align-items: center; padding: 13px 14px; gap: 10px;
  margin-bottom: 1px;
}
.setting-item:first-of-type { border-radius: var(--radius) var(--radius) 0 0; }
.setting-item:last-of-type { border-radius: 0 0 var(--radius) var(--radius); margin-bottom: 0; }
.setting-item:only-of-type { border-radius: var(--radius); }
.setting-item-label { flex: 1; font-size: 15px; }
.setting-item-value { font-size: 14px; color: var(--text-3); }
.setting-item:active { background: var(--primary-light); }

/* Provider editor */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 13px; color: var(--text-2); margin-bottom: 5px; display: block; }
.form-input {
  width: 100%; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 12px; font-size: 14px; outline: none; background: var(--bg);
  color: var(--text);
}
.form-input:focus { border-color: var(--primary); background: var(--bg-card); }

/* Model tag list */
.model-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.model-tag {
  background: var(--primary-light); color: var(--primary);
  border-radius: 6px; padding: 4px 10px; font-size: 13px;
  display: flex; align-items: center; gap: 6px;
}
.model-tag-del { color: var(--primary); font-size: 16px; line-height: 1; }
.add-model-row { display: flex; gap: 8px; margin-top: 8px; }
.add-model-row .form-input { flex: 1; }

/* Assemble preview */
.preview-box {
  background: var(--bg); border-radius: 8px; padding: 12px;
  font-size: 13px; line-height: 1.7; color: var(--text-2);
  white-space: pre-wrap; word-break: break-word; max-height: 200px;
  overflow-y: auto; border: 1px solid var(--border);
}

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); color: #fff; padding: 9px 18px;
  border-radius: 20px; font-size: 14px; z-index: 999;
  opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* Empty state */
.empty { text-align: center; padding: 60px 20px; color: var(--text-3); }
.empty svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }
.empty p { font-size: 14px; }

/* Confirm dialog */
.dialog-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4);
  z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px;
}
.dialog-overlay.active { display: flex; }
.dialog {
  background: var(--bg-card); border-radius: 14px; width: 100%; max-width: 320px;
  overflow: hidden;
}
.dialog-title { font-size: 16px; font-weight: 600; padding: 18px 18px 8px; }
.dialog-msg { font-size: 14px; color: var(--text-2); padding: 0 18px 18px; line-height: 1.6; }
.dialog-btns { display: flex; border-top: 1px solid var(--border); }
.dialog-btn { flex: 1; padding: 14px; font-size: 16px; text-align: center; }
.dialog-btn + .dialog-btn { border-left: 1px solid var(--border); }
.dialog-btn.confirm { color: var(--danger); font-weight: 500; }
.dialog-btn.cancel { color: var(--text-2); }

/* Streaming cursor */
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.cursor { display: inline-block; width: 2px; height: 14px; background: var(--text); animation: blink 1s infinite; vertical-align: middle; margin-left: 2px; }

/* Folder tree */
.folder-group { margin-bottom: 6px; }
.folder-header {
  display: flex; align-items: center; gap: 8px; padding: 9px 14px;
  background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.folder-header:active { background: var(--primary-light); }
.folder-arrow { flex-shrink: 0; transition: transform 0.2s; color: var(--text-3); }
.folder-arrow.collapsed { transform: rotate(-90deg); }
.folder-label { flex: 1; font-size: 14px; font-weight: 600; color: var(--text); }
.folder-count { font-size: 12px; color: var(--text-3); }
.folder-children { margin-left: 14px; padding-left: 10px; border-left: 2px solid var(--border); margin-top: 4px; }
.folder-children.hidden { display: none; }
.file-item.in-folder { border-radius: 8px; margin-bottom: 4px; }
.drag-handle {
  width: 18px; flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  color: var(--text-3); touch-action: pan-y; cursor: grab; opacity: 0.5;
}
.drag-handle:active { cursor: grabbing; }
.drag-handle svg { width: 14px; height: 14px; }
.file-item.dragging, .folder-group.dragging { opacity: 0.3; }

/* Dark mode */
@media (prefers-color-scheme: dark) {
  :root {
    --primary: #5ba3e6;
    --primary-light: #1e2d40;
    --primary-dark: #4a8fcf;
    --bg: #121212;
    --bg-card: #1e1e1e;
    --text: #e0e0e0;
    --text-2: #aaa;
    --text-3: #777;
    --border: #333;
  }
  .form-input:focus { background: #2a2a2a; }
  .msg.assistant .msg-bubble { background: #1e1e1e; border-color: #333; }
  .msg.user .msg-bubble { background: #5ba3e6; }
  .editor-textarea { background: #1e1e1e; }
  .chat-input { background: #2a2a2a; border-color: #444; color: #fff; }
  .form-input { background: #2a2a2a; border-color: #444; color: #fff; }
  .editor-title-input { color: #e0e0e0; }
  .dialog { background: #1e1e1e; }
  .sheet { background: #1e1e1e; }
  .preview-box { background: #2a2a2a; border-color: #444; }
  .setting-item:active { background: var(--primary-light); }
  .model-select-btn { background: #2a2a2a; border-color: #444; }
}
.drag-ghost {
  position: fixed; pointer-events: none; z-index: 500; opacity: 0.9;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15); border-radius: var(--radius);
  background: var(--bg-card); border: 1px solid var(--primary);
}
.drop-indicator {
  height: 2px; background: var(--primary); border-radius: 2px;
  margin: 1px 0; pointer-events: none;
}

/* Project list */
#overlay-project { z-index: 250; }
.project-item {
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); margin-bottom: 8px;
  display: flex; align-items: center; gap: 0;
}
.project-item-body { flex: 1; padding: 14px 16px; cursor: pointer; min-width: 0; }
.project-item-body:active { background: var(--primary-light); border-radius: var(--radius) 0 0 var(--radius); }
.project-name { font-size: 16px; font-weight: 600; }
.project-meta { font-size: 12px; color: var(--text-3); margin-top: 3px; }
.project-edit-btn {
  width: 44px; height: 100%; display: flex; align-items: center; justify-content: center;
  color: var(--text-3); border-left: 1px solid var(--border); flex-shrink: 0; padding: 14px 0;
}
.project-edit-btn:active { background: var(--bg); }
</style>
</head>
<body>
<div id="app">
  <!-- ===== TAB: 文件 ===== -->
  <div class="tab-content active" id="tab-files">
    <div class="header">
      <h1 id="header-project-name" style="font-size:16px;flex:1">项目</h1>
      <button class="header-btn" id="btn-sync" title="GitHub 同步" style="display:none">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </button>
      <button class="header-btn" id="btn-new-file" title="新建文件">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="list-area" id="file-list"></div>
    <div class="assemble-bar hidden" id="assemble-bar">
      <span class="assemble-count" id="assemble-count"></span>
      <button class="btn-primary" id="btn-assemble">拼装提示词</button>
    </div>
  </div>

  <!-- ===== TAB: 对话 ===== -->
  <div class="tab-content" id="tab-chat">
    <div class="chat-model-bar">
      <button class="model-select-btn" id="btn-model-select">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        <span id="current-model-label">请选择模型</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14" style="margin-left:auto"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="icon-btn" id="btn-history" title="历史对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M3 3h7v7H3zM14 3h7v7h-7zM14 14h7v7h-7zM3 14h7v7H3z"/></svg>
      </button>
      <button class="icon-btn" id="btn-new-chat" title="新对话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="empty" id="chat-empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        <p>选择文件拼装提示词，或直接输入开始对话</p>
      </div>
    </div>
    <button class="scroll-bottom-btn" id="btn-chat-bottom" title="滚动到底部" aria-label="滚动到底部">↓</button>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="输入消息..." rows="1"></textarea>
      <button class="send-btn" id="btn-send" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </div>

  <!-- ===== TAB: 设置 ===== -->
  <div class="tab-content" id="tab-settings">
    <div class="header"><h1>设置</h1></div>
    <div class="list-area">
      <div class="setting-section">
        <div class="setting-label">AI 提供商</div>
        <div id="provider-list"></div>
        <button class="btn-secondary" style="width:100%;margin-top:8px" id="btn-add-provider">+ 添加提供商</button>
      </div>
      <div class="setting-section">
        <div class="setting-label">应用</div>
        <div class="setting-item" id="btn-reload" style="cursor:pointer">
          <span class="setting-item-label">刷新应用（获取最新版本）</span>

<script>
// ===== DB =====
const DB_NAME = 'promptbox', DB_VER = 3;
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('files')) d.createObjectStore('files', {keyPath:'id'});
      if (!d.objectStoreNames.contains('conversations')) d.createObjectStore('conversations', {keyPath:'id'});
      if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', {keyPath:'key'});
      if (!d.objectStoreNames.contains('projects')) d.createObjectStore('projects', {keyPath:'id'});
      if (!d.objectStoreNames.contains('folderMeta')) d.createObjectStore('folderMeta', {keyPath:'key'});
    };
    req.onsuccess = e => { db = e.target.result; res(db); };
    req.onerror = e => rej(e);
  });
}
function dbGet(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}
function dbGetAll(store) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAll();
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}
function dbPut(store, val) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(val);
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}
function dbDelete(store, key) {
  return new Promise((res, rej) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => res();
    req.onerror = rej;
  });
}
function uuid() { return crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2); }
function ts() { return Date.now(); }
function fmtDate(t) {
  const d = new Date(t), now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toTimeString().slice(0,5);
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ===== STATE =====
let files = [], providers = [], conversations = [], settings = {}, projects = [], folderMetas = [];
let currentProjectId = null;
let currentConvId = null;
let selectedFileIds = []; // 有序数组，维护拼装顺序
let editingFileId = null;
let editingProviderId = null;
let editingProjectId = null;
let pendingAssembledText = null;
let isStreaming = false;
let abortController = null;
let tempModelTags = [];
let editingModelIndex = -1;
let dragState = null;

// ===== LOAD =====
async function loadAll() {
  projects = await dbGetAll('projects');
  projects.sort((a,b) => a.createdAt - b.createdAt);

  const allFiles = await dbGetAll('files');
  const allConvs = await dbGetAll('conversations');

  // 迁移：旧数据没有 projectId，分配到默认项目
  const needsMigration = (allFiles.some(f => !f.projectId) || allConvs.some(c => !c.projectId));
  if (needsMigration) {
    let defaultProj = projects.find(p => p.name === '默认项目') || projects[0];
    if (!defaultProj) {
      defaultProj = { id: uuid(), name: '默认项目', createdAt: ts(), updatedAt: ts() };
      projects.push(defaultProj);
      await dbPut('projects', defaultProj);
    }
    for (const f of allFiles) {
      if (!f.projectId) { f.projectId = defaultProj.id; await dbPut('files', f); }
    }
    for (const c of allConvs) {
      if (!c.projectId) { c.projectId = defaultProj.id; await dbPut('conversations', c); }
    }
  }

  files = allFiles.sort((a,b) => b.updatedAt - a.updatedAt);
  conversations = allConvs.sort((a,b) => b.updatedAt - a.updatedAt);
  folderMetas = await dbGetAll('folderMeta');
  const s = await dbGet('settings', 'main');
  settings = s ? s.data : { providers: [], currentProviderId: null, currentModelId: null };
  providers = settings.providers || [];
}

// ===== TOAST =====
let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ===== CONFIRM DIALOG =====
let dialogResolve;
function confirm(title, msg, confirmText = '删除') {
  return new Promise(res => {
    dialogResolve = res;
    document.getElementById('dialog-title').textContent = title;
    document.getElementById('dialog-msg').textContent = msg;
    document.getElementById('dialog-confirm').textContent = confirmText;
    document.getElementById('dialog-overlay').classList.add('active');
  });
}
document.getElementById('dialog-cancel').onclick = () => {
  document.getElementById('dialog-overlay').classList.remove('active');
  if (dialogResolve) dialogResolve(false);
};
document.getElementById('dialog-confirm').onclick = () => {
  document.getElementById('dialog-overlay').classList.remove('active');
  if (dialogResolve) dialogResolve(true);
};

// ===== TABS =====
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    if (tab === 'settings') { renderProviders(); renderProjectManageList(); }
  });
});

// ===== FILES =====
function getFolderMeta(projectId, folderName) {
  return folderMetas.find(m => m.projectId === projectId && m.name === folderName);
}

function ensureFolderMeta(projectId, folderName) {
  let meta = getFolderMeta(projectId, folderName);
  if (!meta) {
    meta = { key: `${projectId}::${folderName}`, projectId, name: folderName, sortOrder: 9999, collapsed: false };
    folderMetas.push(meta);
  }
  return meta;
}

function buildTree(projectFiles) {
  const folderMap = new Map();
  const rootFiles = [];
  for (const f of projectFiles) {
    if (f.folder) {
      if (!folderMap.has(f.folder)) folderMap.set(f.folder, []);
      folderMap.get(f.folder).push(f);
    } else {
      rootFiles.push(f);
    }
  }
  for (const arr of folderMap.values()) {
    arr.sort((a, b) => (a.sortOrder ?? 9999) - (b.sortOrder ?? 9999) || b.updatedAt - a.updatedAt);
  }
  rootFiles.sort((a, b) => (a.sortOrder ?? 9999) - (b.sortOrder ?? 9999) || b.updatedAt - a.updatedAt);
  const folders = [...folderMap.entries()].map(([name, fls]) => {
    const meta = getFolderMeta(currentProjectId, name);
    return { name, files: fls, sortOrder: meta?.sortOrder ?? 9999, collapsed: meta?.collapsed ?? false };
  });
  folders.sort((a, b) => a.sortOrder - b.sortOrder || a.name.localeCompare(b.name, 'zh'));
  const topItems = [
    ...folders.map(folder => ({ type: 'folder', sortOrder: folder.sortOrder, name: folder.name, folder })),
    ...rootFiles.map(file => ({ type: 'file', sortOrder: file.sortOrder ?? 9999, name: file.name, file }))
  ];
  topItems.sort((a, b) => a.sortOrder - b.sortOrder || (a.type === b.type ? a.name.localeCompare(b.name, 'zh') : a.type === 'folder' ? -1 : 1));
  return { topItems, folders, rootFiles };
}

const DRAG_HANDLE_SVG = `<svg viewBox="0 0 10 16" fill="currentColor"><circle cx="3" cy="3" r="1.2"/><circle cx="7" cy="3" r="1.2"/><circle cx="3" cy="8" r="1.2"/><circle cx="7" cy="8" r="1.2"/><circle cx="3" cy="13" r="1.2"/><circle cx="7" cy="13" r="1.2"/></svg>`;

    </div>
    <div class="file-actions">
      <button class="icon-btn" data-copy-file="${f.id}" title="复制内容">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      </button>
      <button class="icon-btn" data-del-file="${f.id}" title="删除" style="color:var(--danger)">

function renderFiles() {

document.getElementById('file-list').addEventListener('click', async e => {
  if (dragState) return; // 拖拽中忽略点击
  const checkId = e.target.closest('[data-check]')?.dataset.check;
  const editId = e.target.closest('[data-edit]')?.dataset.edit;
  const copyId = e.target.closest('[data-copy-file]')?.dataset.copyFile;
  const delId = e.target.closest('[data-del-file]')?.dataset.delFile;
  const toggleFolder = e.target.closest('[data-toggle-folder]')?.dataset.toggleFolder;

  if (checkId) {
    if (selectedFileIds.includes(checkId)) {
      selectedFileIds = selectedFileIds.filter(id => id !== checkId);
    } else {
      selectedFileIds.push(checkId);
    }
    // 只更新勾选样式，不重渲染整个列表
    const itemEl = document.querySelector(`.file-item[data-id="${checkId}"]`);
    if (itemEl) itemEl.classList.toggle('checked', selectedFileIds.includes(checkId));
    updateAssembleBar();
  } else if (editId) {
    openEditor(editId);
  } else if (copyId) {
    const f = files.find(x => x.id === copyId);
    if (f) { await copyText(f.content); toast('已复制文件内容'); }
  } else if (delId) {
    const f = files.find(x => x.id === delId);
    if (!f) return;
    const ok = await confirm('删除文件', `确定删除「${f.name}」？此操作不可撤销。`);
    if (ok) {
      await dbDelete('files', delId);
      files = files.filter(x => x.id !== delId);
      selectedFileIds = selectedFileIds.filter(id => id !== delId);
      renderFiles();
      toast('已删除');
    }
  } else if (toggleFolder !== undefined) {
    // 不要让拖拽手柄触发折叠
    if (e.target.closest('[data-drag-folder]')) return;
    await toggleFolderCollapse(toggleFolder);
  }
});

async function toggleFolderCollapse(folderName) {
  const key = `${currentProjectId}::${folderName}`;
  let meta = folderMetas.find(m => m.key === key);
  if (!meta) {
    meta = { key, projectId: currentProjectId, name: folderName, sortOrder: 9999, collapsed: false };
    folderMetas.push(meta);
  }
  meta.collapsed = !meta.collapsed;
  await dbPut('folderMeta', meta);
  // 只切换 DOM，不重渲染
  const childrenEl = document.querySelector(`[data-folder-children="${CSS.escape(folderName)}"]`);
  const arrowEl = document.querySelector(`[data-folder-group="${CSS.escape(folderName)}"] .folder-arrow`);
  if (childrenEl) childrenEl.classList.toggle('hidden', meta.collapsed);
  if (arrowEl) arrowEl.classList.toggle('collapsed', meta.collapsed);
}

async function saveAndCloseEditor() {
  let name = document.getElementById('editor-title').value.trim() || '未命名文件';
  const content = document.getElementById('editor-content').value;
  const newFolderInput = document.getElementById('editor-folder-new');
  let folder;
  if (newFolderInput.style.display !== 'none' && newFolderInput.value.trim()) {
    folder = newFolderInput.value.trim();
  } else {
    folder = document.getElementById('editor-folder-select').value;
  }
  // 文件名含 / 时优先解析
  if (name.includes('/')) {
    const idx = name.lastIndexOf('/');
    folder = name.slice(0, idx).trim() || folder;
    name = name.slice(idx + 1).trim() || '未命名文件';
  }
  if (editingFileId) {
    const f = files.find(x => x.id === editingFileId);
    if (f) {
      f.name = name;
      f.folder = folder || undefined;
      f.content = content;
      f.updatedAt = ts();
      await dbPut('files', f);
    }
  } else {
    if (content.trim() || name !== '未命名文件') {
      const f = { id: uuid(), name, folder: folder || undefined, content, projectId: currentProjectId, createdAt: ts(), updatedAt: ts() };
      files.unshift(f);
      await dbPut('files', f);
    }
  }
  document.getElementById('editor-screen').classList.remove('active');
  renderFiles();
}

// ===== DRAG SORT =====
(function() {
  const LONG_PRESS_MS = 200;
  let pressTimer = null;
  let startTouch = null;

  function getFileListEl() { return document.getElementById('file-list'); }

  function clearTextSelection() {
    const selection = window.getSelection?.();
    if (selection && !selection.isCollapsed) selection.removeAllRanges();
  }

  function createGhost(sourceEl) {
    const rect = sourceEl.getBoundingClientRect();
    const ghost = sourceEl.cloneNode(true);
    ghost.className = 'drag-ghost';
    ghost.style.width = rect.width + 'px';
    ghost.style.top = rect.top + 'px';
    ghost.style.left = rect.left + 'px';
    document.body.appendChild(ghost);
    return ghost;
  }

  function moveGhost(ghost, dy) {
    const top = parseFloat(ghost.style.top) + dy;
    ghost.style.top = top + 'px';
  }

  function removeDropIndicator() {
    document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
  }

  // 重新计算 sortOrder：取前后平均值，精度不足时全量重排
  function calcNewOrder(siblings, insertAfterIdx) {
    const prev = insertAfterIdx >= 0 ? siblings[insertAfterIdx] : null;
    const next = insertAfterIdx + 1 < siblings.length ? siblings[insertAfterIdx + 1] : null;
    const prevOrder = prev ? (prev.sortOrder ?? 0) : (next ? (next.sortOrder ?? 0) - 2000 : 0);
    const nextOrder = next ? (next.sortOrder ?? 0) : prevOrder + 2000;
    const newOrder = (prevOrder + nextOrder) / 2;
    // 精度不足时触发全量重排
    if (Math.abs(nextOrder - prevOrder) < 1) return null;
    return newOrder;
  }

  function reindexSortOrder(items) {
    items.forEach((item, i) => { item.sortOrder = i * 1000; });
  }

  // ---- 文件拖拽 ----
  async function endFileDrag(fileId, folderName, insertAfterEl) {
    const siblings = files.filter(f => f.projectId === currentProjectId && (f.folder || '') === (folderName || ''));
    siblings.sort((a, b) => (a.sortOrder ?? 9999) - (b.sortOrder ?? 9999) || b.updatedAt - a.updatedAt);
    const draggedFile = files.find(f => f.id === fileId);
    if (!draggedFile) return;
    if (!folderName) {
      const projectFiles = files.filter(f => f.projectId === currentProjectId);
      const topItems = buildTree(projectFiles).topItems.filter(item => !(item.type === 'file' && item.file.id === fileId));
      let topInsertAfterIdx = -1;
      if (insertAfterEl) {
        topInsertAfterIdx = topItems.findIndex(item =>
          (item.type === 'file' && item.file.id === insertAfterEl.dataset.id) ||
          (item.type === 'folder' && item.name === insertAfterEl.dataset.folderGroup)
        );
      }
      let topNewOrder = calcNewOrder(topItems, topInsertAfterIdx);
      if (topNewOrder === null) {
        reindexSortOrder(topItems);
        topNewOrder = calcNewOrder(topItems, topInsertAfterIdx);
      }
      draggedFile.folder = undefined;
      draggedFile.sortOrder = topNewOrder ?? 0;
      draggedFile.updatedAt = ts();
      await dbPut('files', draggedFile);
      for (const item of topItems) {
        if (item.sortOrder === undefined) continue;
        if (item.type === 'file') {
          item.file.sortOrder = item.sortOrder;
          await dbPut('files', item.file);
        } else {
          const meta = ensureFolderMeta(currentProjectId, item.name);
          meta.sortOrder = item.sortOrder;
          await dbPut('folderMeta', meta);
        }
      }
      renderFiles();
      return;
    }
    // 从 siblings 中移除被拖拽项，确定插入位置
    const withoutDragged = siblings.filter(f => f.id !== fileId);
    let insertAfterIdx = -1;
    if (insertAfterEl) {
      const afterId = insertAfterEl.dataset.id;
      insertAfterIdx = withoutDragged.findIndex(f => f.id === afterId);
    }
    let newOrder = calcNewOrder(withoutDragged, insertAfterIdx);
    if (newOrder === null) {
      reindexSortOrder(withoutDragged);
      newOrder = calcNewOrder(withoutDragged, insertAfterIdx);
    }
    draggedFile.sortOrder = newOrder ?? 0;
    draggedFile.updatedAt = ts();
    await dbPut('files', draggedFile);
    // 如果全量重排了，批量保存
    for (const f of withoutDragged) {
      if (f.sortOrder !== undefined) await dbPut('files', f);
    }
    renderFiles();
  }

  // ---- 目录拖拽 ----
  async function endFolderDrag(folderName, insertAfterEl) {
    const projectFolderMetas = folderMetas.filter(m => m.projectId === currentProjectId);
    // 获取当前所有目录（包括没有 meta 的）
    const allFolderNames = [...new Set(files.filter(f => f.projectId === currentProjectId && f.folder).map(f => f.folder))];
    // 确保每个目录都有 meta
    for (const name of allFolderNames) {
      if (!folderMetas.find(m => m.projectId === currentProjectId && m.name === name)) {
        const meta = ensureFolderMeta(currentProjectId, name);
        await dbPut('folderMeta', meta);
      }
    }
    const projectFiles = files.filter(f => f.projectId === currentProjectId);
    const topItems = buildTree(projectFiles).topItems.filter(item => !(item.type === 'folder' && item.name === folderName));
    const draggedMeta = ensureFolderMeta(currentProjectId, folderName);
    if (!draggedMeta) return;
    let insertAfterIdx = -1;
    if (insertAfterEl) {
      insertAfterIdx = topItems.findIndex(item =>
        (item.type === 'file' && item.file.id === insertAfterEl.dataset.id) ||
        (item.type === 'folder' && item.name === insertAfterEl.dataset.folderGroup)
      );
    }
    let newOrder = calcNewOrder(topItems, insertAfterIdx);
    if (newOrder === null) {
      reindexSortOrder(topItems);
      newOrder = calcNewOrder(topItems, insertAfterIdx);
    }
    draggedMeta.sortOrder = newOrder ?? 0;
    await dbPut('folderMeta', draggedMeta);
    for (const item of topItems) {
      if (item.sortOrder === undefined) continue;
      if (item.type === 'file') {
        item.file.sortOrder = item.sortOrder;
        await dbPut('files', item.file);
      } else {
        const meta = ensureFolderMeta(currentProjectId, item.name);
        meta.sortOrder = item.sortOrder;
        await dbPut('folderMeta', meta);
      }
    }
    renderFiles();
  }

  // ---- Touch 事件 ----
  getFileListEl().addEventListener('touchstart', e => {
    const handle = e.target.closest('[data-drag-file],[data-drag-folder]');
    if (!handle) return;
    clearTextSelection();
    startTouch = e.touches[0];
    pressTimer = setTimeout(() => {
      pressTimer = null;
      clearTextSelection();
      const isFile = handle.hasAttribute('data-drag-file');
      const id = isFile ? handle.dataset.dragFile : handle.dataset.dragFolder;
      const sourceEl = isFile
        ? handle.closest('.file-item')
        : handle.closest('.folder-group');
      if (!sourceEl) return;
      sourceEl.classList.add('dragging');
      const ghost = createGhost(sourceEl);
      dragState = { isFile, id, ghost, sourceEl, lastY: startTouch.clientY, insertAfterEl: null };
    }, LONG_PRESS_MS);
  }, { passive: true });

  document.addEventListener('touchmove', e => {
    if (pressTimer !== null) {
      // 手指移动超过阈值则取消长按
      const dx = Math.abs(e.touches[0].clientX - startTouch.clientX);
      const dy = Math.abs(e.touches[0].clientY - startTouch.clientY);
      if (dx > 8 || dy > 8) { clearTimeout(pressTimer); pressTimer = null; }
      return;
    }
    if (!dragState) return;
    e.preventDefault();
    const touch = e.touches[0];
    const dy = touch.clientY - dragState.lastY;
    dragState.lastY = touch.clientY;
    moveGhost(dragState.ghost, dy);

    // 找插入位置
    removeDropIndicator();
    const listEl = getFileListEl();
    const draggedFile = dragState.isFile ? files.find(x => x.id === dragState.id) : null;
    const folderListEl = dragState.sourceEl.closest('.folder-children');
    const items = dragState.isFile
      ? (draggedFile?.folder
        ? [...(folderListEl || listEl).querySelectorAll(`.file-item:not(.dragging)`)]
        : [...listEl.querySelectorAll(`#file-list > .folder-group:not(.dragging), #file-list > .file-item:not(.dragging)`)])
      : [...listEl.querySelectorAll(`#file-list > .folder-group:not(.dragging), #file-list > .file-item:not(.dragging)`)];

    let insertAfterEl = null;
    let insertBeforeEl = null;
    for (const item of items) {
      const rect = item.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if (touch.clientY > mid) {
        insertAfterEl = item;
      } else if (!insertBeforeEl) {
        insertBeforeEl = item;
        break;
      }
    }
    dragState.insertAfterEl = insertAfterEl;

    // 显示插入指示线
    const indicator = document.createElement('div');
    indicator.className = 'drop-indicator';
    if (insertAfterEl) {
      insertAfterEl.after(indicator);
    } else if (insertBeforeEl) {
      insertBeforeEl.before(indicator);
    } else if (items.length === 0) {
      (folderListEl || listEl).appendChild(indicator);
    }
  }, { passive: false });

  document.addEventListener('touchend', async e => {
    clearTimeout(pressTimer);
    pressTimer = null;
    if (!dragState) return;
    const { isFile, id, ghost, sourceEl, insertAfterEl } = dragState;
    dragState = null;
    ghost.remove();
    sourceEl.classList.remove('dragging');
    removeDropIndicator();
    if (isFile) {
      const f = files.find(x => x.id === id);
      await endFileDrag(id, f?.folder || '', insertAfterEl);
    } else {
      await endFolderDrag(id, insertAfterEl);
    }
  });

  document.addEventListener('touchcancel', () => {
    clearTimeout(pressTimer);
    pressTimer = null;
    if (!dragState) return;
    dragState.ghost.remove();
    dragState.sourceEl.classList.remove('dragging');
    removeDropIndicator();
    dragState = null;
  });
})();

function buildAssembledText(customPrompt) {
  const parts = [];
  selectedFileIds.forEach(id => {
    const f = files.find(x => x.id === id);
    if (f) parts.push(`[${f.name}]\n${f.content}`);
  });
  if (customPrompt && customPrompt.trim()) parts.push(`---\n${customPrompt.trim()}`);
  return parts.join('\n\n');
}

function estimateTokenCount(text) {
  const cjkCount = (text.match(/[\u3400-\u9fff]/g) || []).length;
  const nonCjkText = text.replace(/[\u3400-\u9fff]/g, ' ');
  const nonCjkUnits = (nonCjkText.match(/[A-Za-z0-9_]+|[^\sA-Za-z0-9_]/g) || []).length;
  return Math.ceil(cjkCount + nonCjkUnits * 0.75);
}

function updateAssemblePreview() {
  const text = buildAssembledText(document.getElementById('assemble-prompt').value);
  document.getElementById('assemble-preview').textContent = text;
  document.getElementById('assemble-stats').textContent =

}

  renderAssembleFileList();

  if (!providers.length) {
    el.innerHTML = `<div class="empty"><p>请先在设置中添加提供商</p></div>`;
  } else {
    el.innerHTML = providers.map(p => `
      <div style="margin-bottom:14px">
        <div style="font-size:12px;color:var(--text-3);padding:0 4px 6px;text-transform:uppercase">${esc(p.name)}</div>
        ${(p.models||[]).map(m => `

let chatAutoFollow = true;
let chatProgrammaticScroll = false;
let chatTouchStartY = null;

function getChatMessagesEl() {
  return document.getElementById('chat-messages');
}

function isChatNearBottom(threshold = 80) {
  const el = getChatMessagesEl();
  return el.scrollHeight - el.scrollTop - el.clientHeight <= threshold;
}

function updateChatBottomButton() {
  const btn = document.getElementById('btn-chat-bottom');
  if (!btn) return;
  btn.classList.toggle('show', !chatAutoFollow);
}

function setChatAutoFollow(enabled) {
  chatAutoFollow = enabled;
  updateChatBottomButton();
}

function scrollChatToBottom() {
  const el = getChatMessagesEl();
  chatProgrammaticScroll = true;
  el.scrollTop = el.scrollHeight;
  requestAnimationFrame(() => {
    el.scrollTop = el.scrollHeight;
    chatProgrammaticScroll = false;
    updateChatBottomButton();
  });
}

getChatMessagesEl().addEventListener('scroll', () => {
  if (chatProgrammaticScroll) return;
  setChatAutoFollow(isChatNearBottom());
}, { passive: true });

getChatMessagesEl().addEventListener('touchstart', e => {
  chatTouchStartY = e.touches[0]?.clientY ?? null;
}, { passive: true });

getChatMessagesEl().addEventListener('touchmove', e => {
  if (chatTouchStartY == null) return;
  const currentY = e.touches[0]?.clientY ?? chatTouchStartY;
  if (currentY - chatTouchStartY > 8) setChatAutoFollow(false);
}, { passive: true });

getChatMessagesEl().addEventListener('touchend', () => { chatTouchStartY = null; }, { passive: true });
getChatMessagesEl().addEventListener('touchcancel', () => { chatTouchStartY = null; }, { passive: true });

getChatMessagesEl().addEventListener('wheel', e => {
  if (e.deltaY < 0) setChatAutoFollow(false);
}, { passive: true });

document.getElementById('btn-chat-bottom').onclick = () => {
  setChatAutoFollow(true);
  scrollChatToBottom();
};

function appendMessage(role, content, scroll = true) {
  const empty = document.getElementById('chat-empty');
  if (empty) empty.remove();
  const el = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const id = 'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
  div.innerHTML = `<div class="msg-bubble">${esc(content)}</div>
    <div class="msg-meta">
      <span class="msg-time">${fmtDate(ts())}</span>
      <span class="msg-copy" data-copy="${id}">复制</span>
    </div>`;
  div.dataset.msgId = id;
  el.appendChild(div);
  if (scroll) {
    setChatAutoFollow(true);
    scrollChatToBottom();
  }
  return div.querySelector('.msg-bubble');
}

const chatInput = document.getElementById('chat-input');
chatInput.addEventListener('input', autoResizeInput);
chatInput.addEventListener('keydown', e => {

function autoResizeInput() {

async function sendMessage() {
  const text = chatInput.value.trim();
  if (!text || isStreaming) return;
  const p = providers.find(x => x.id === settings.currentProviderId);
  const m = p?.models?.find(x => x.id === settings.currentModelId);
  if (!p || !m) { toast('请先选择模型'); return; }

  chatInput.value = '';
  autoResizeInput();
  document.getElementById('btn-send').disabled = true;

  appendMessage('user', text);

  if (!currentConvId) {
    currentConvId = uuid();
    const title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
    const conv = { id: currentConvId, title, projectId: currentProjectId, providerId: p.id, modelId: m.id, messages: [], createdAt: ts(), updatedAt: ts() };
    conversations.unshift(conv);
    await dbPut('conversations', conv);
  }

  const conv = conversations.find(x => x.id === currentConvId);
  conv.messages.push({ role: 'user', content: text });
  conv.updatedAt = ts();

  const bubble = appendMessage('assistant', '');
  bubble.innerHTML = '<span class="msg-thinking">思考中...</span>';

  isStreaming = true;
  abortController = new AbortController();

  // 检测是否支持流式读取
  const supportsStream = typeof ReadableStream !== 'undefined' && typeof TextDecoder !== 'undefined';

  let full = '';
  let renderTimer = null;
  let pendingFlush = false;

  function flushDisplay() {
    pendingFlush = false;
    bubble.textContent = full;
    if (chatAutoFollow) scrollChatToBottom();
  }

  try {
    const reqBody = { model: m.id, messages: conv.messages.map(x => ({role:x.role,content:x.content})), stream: supportsStream };
    if (m.maxTokens) reqBody.max_tokens = m.maxTokens;
    if (m.temperature != null) reqBody.temperature = m.temperature;
    if (m.topP != null) reqBody.top_p = m.topP;
    const resp = await fetch(`${p.baseUrl.replace(/\/$/, '')}/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${p.apiKey}` },
      body: JSON.stringify(reqBody),
      signal: abortController.signal
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`API 错误 ${resp.status}: ${err.slice(0,200)}`);
    }

    bubble.textContent = '';

    if (supportsStream && resp.body) {
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split('\n');
        buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            const delta = json.choices?.[0]?.delta?.content || '';
            if (delta) {
              full += delta;
              if (!pendingFlush) {
                pendingFlush = true;
                renderTimer = setTimeout(flushDisplay, 60);
              }
            }
          } catch {}
        }
      }
      clearTimeout(renderTimer);
      flushDisplay();
    } else {
      const json = await resp.json();
      full = json.choices?.[0]?.message?.content || '';
      bubble.textContent = full;
      if (chatAutoFollow) scrollChatToBottom();
    }

    conv.messages.push({ role: 'assistant', content: full });
    conv.updatedAt = ts();
    await dbPut('conversations', conv);

  } catch (err) {
    clearTimeout(renderTimer);
    if (err.name !== 'AbortError') {
      bubble.textContent = `错误：${err.message}`;
      bubble.style.color = 'var(--danger)';
    }
  } finally {
    isStreaming = false;
    abortController = null;
    clearTimeout(renderTimer);
    document.getElementById('btn-send').disabled = false;
  }
}

document.getElementById('btn-save-project').onclick = async () => {

      document.getElementById('header-project-name').textContent = name;

    }
  } else {
    const p = { id: uuid(), name, githubPAT, githubRepo, githubDir, githubBranch, createdAt: ts(), updatedAt: ts() };

    await dbPut('projects', p);
    if (!currentProjectId) enterProject(p.id);

document.getElementById('btn-delete-project').onclick = async () => {
  const fc = files.filter(f => f.projectId === editingProjectId).length;
  const cc = conversations.filter(c => c.projectId === editingProjectId).length;
  const ok = await confirm('删除项目', `确定删除此项目？项目内 ${fc} 个文件、${cc} 条对话将一并删除，不可撤销。`);
  if (!ok) return;
  for (const f of files.filter(x => x.projectId === editingProjectId)) await dbDelete('files', f.id);
  for (const c of conversations.filter(x => x.projectId === editingProjectId)) await dbDelete('conversations', c.id);
  await dbDelete('projects', editingProjectId);
  files = files.filter(f => f.projectId !== editingProjectId);
  conversations = conversations.filter(c => c.projectId !== editingProjectId);
  projects = projects.filter(p => p.id !== editingProjectId);
  if (currentProjectId === editingProjectId) {
    currentProjectId = null;
    currentConvId = null;
    if (projects.length > 0) enterProject(projects[0].id);
  }
  document.getElementById('overlay-project').classList.remove('active');
  if (currentProjectId) renderProjectManageList();
  toast('已删除');
};

function renderModelTags() {
  const el = document.getElementById('p-model-tags');
  el.innerHTML = tempModelTags.map((m, i) => {
    let info = esc(m.id);
    const parts = [];
    if (m.maxTokens) parts.push(`≤${m.maxTokens}t`);
    if (m.temperature != null) parts.push(`T=${m.temperature}`);
    if (m.topP != null) parts.push(`p=${m.topP}`);
    if (parts.length) info += ` · ${parts.join(' ')}`;
    return `<div class="model-tag" data-edit-tag="${i}" style="cursor:pointer">
      <span>${esc(m.name)}</span>
      <span style="font-size:11px;opacity:0.7">${info}</span>
      <button class="model-tag-del" data-del-tag="${i}">×</button>
    </div>`;
  }).join('');
}

function populateModelForm(i) {
  const m = tempModelTags[i];
  if (!m) return;
  editingModelIndex = i;
  document.getElementById('p-model-name').value = m.name;
  document.getElementById('p-model-id').value = m.id;
  document.getElementById('p-model-tokens').value = m.maxTokens || '';
  document.getElementById('p-model-temp').value = m.temperature != null ? m.temperature : '';
  document.getElementById('p-model-topp').value = m.topP != null ? m.topP : '';
  document.getElementById('btn-add-model-tag').textContent = '更新';
}

function clearModelForm() {
  editingModelIndex = -1;
  document.getElementById('p-model-name').value = '';
  document.getElementById('p-model-id').value = '';
  document.getElementById('p-model-tokens').value = '';
  document.getElementById('p-model-temp').value = '';
  document.getElementById('p-model-topp').value = '';

}

document.getElementById('p-model-tags').addEventListener('click', e => {
  const del = e.target.closest('[data-del-tag]')?.dataset.delTag;
  if (del !== undefined) { tempModelTags.splice(Number(del), 1); if (editingModelIndex >= Number(del)) editingModelIndex--; renderModelTags(); clearModelForm(); return; }
  const edit = e.target.closest('[data-edit-tag]')?.dataset.editTag;
  if (edit !== undefined) populateModelForm(Number(edit));
});

document.getElementById('btn-add-model-tag').onclick = () => {
  const name = document.getElementById('p-model-name').value.trim();
  const id = document.getElementById('p-model-id').value.trim();
  if (!name || !id) { toast('请填写模型名称和 ID'); return; }
  const maxTokens = parseInt(document.getElementById('p-model-tokens').value) || 0;
  const temperature = parseFloat(document.getElementById('p-model-temp').value);
  const topP = parseFloat(document.getElementById('p-model-topp').value);
  const model = { name, id };
  if (maxTokens > 0) model.maxTokens = maxTokens;
  if (!isNaN(temperature)) model.temperature = temperature;
  if (!isNaN(topP)) model.topP = topP;
  if (editingModelIndex >= 0) {
    tempModelTags[editingModelIndex] = model;
  } else {
    tempModelTags.push(model);
  }
  clearModelForm();
  renderModelTags();
};

document.getElementById('import-input').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;
  const ok = await confirm('导入备份', '导入将覆盖当前所有数据，确定继续？', '导入');
  if (!ok) { e.target.value = ''; return; }
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    for (const p of (data.projects || [])) await dbPut('projects', p);
    for (const f of (data.files || [])) await dbPut('files', f);
    for (const c of (data.conversations || [])) await dbPut('conversations', c);
    if (data.settings) await dbPut('settings', { key: 'main', data: data.settings });
    await loadAll();
    if (projects.length > 0) enterProject(projects[0].id);
    renderProviders();
    renderCurrentModel();
    toast('导入成功');
  } catch (err) {
    toast('导入失败：' + err.message);
  }
  e.target.value = '';
};

// ===== GITHUB SYNC =====
document.getElementById('btn-sync').onclick = () => {
  document.getElementById('sync-log').textContent = '';
  document.getElementById('overlay-sync').classList.add('active');
};
document.getElementById('btn-close-sync').onclick = () => document.getElementById('overlay-sync').classList.remove('active');

function syncLog(msg) {
  const el = document.getElementById('sync-log');
  el.textContent += msg + '\n';
}

function ghHeaders(pat) {
  return { 'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json', 'X-GitHub-Api-Version': '2022-11-28' };
}

async function ghListTree(pat, repo, branch) {
  const r = await fetch(`https://api.github.com/repos/${repo}/git/trees/${branch}?recursive=1`, { headers: ghHeaders(pat) });
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${await r.text()}`);
  const j = await r.json();
  return j.tree.filter(x => x.type === 'blob');
}

async function ghGetFile(pat, repo, path, branch) {
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/${encodeURIComponent(path)}?ref=${branch}`, { headers: ghHeaders(pat) });
  if (!r.ok) throw new Error(`获取文件失败 ${r.status}`);
  return await r.json(); // { content (base64), sha, ... }
}

async function ghPutFile(pat, repo, path, content, sha, branch, message) {
  const body = { message, content: btoa(unescape(encodeURIComponent(content))), branch };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/${encodeURIComponent(path)}`, {
    method: 'PUT', headers: { ...ghHeaders(pat), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`写入文件失败 ${r.status}: ${await r.text()}`);
  const j = await r.json();
  return j.content.sha;
}

document.getElementById('btn-sync-pull').onclick = async () => {
  const proj = projects.find(p => p.id === currentProjectId);
  if (!proj?.githubRepo || !proj?.githubPAT) { syncLog('请先在项目设置中配置 GitHub 信息'); return; }
  document.getElementById('btn-sync-pull').disabled = true;
  document.getElementById('btn-sync-push').disabled = true;
  syncLog('开始拉取...');
  try {
    const dir = proj.githubDir ? proj.githubDir + '/' : '';
    const tree = await ghListTree(proj.githubPAT, proj.githubRepo, proj.githubBranch || 'main');
    const targets = tree.filter(x => {
      if (dir && !x.path.startsWith(dir)) return false;
      return /\.(md|txt)$/i.test(x.path);
    });
    syncLog(`找到 ${targets.length} 个文件`);
    let created = 0, updated = 0, skipped = 0;
    for (const item of targets) {
      const fileData = await ghGetFile(proj.githubPAT, proj.githubRepo, item.path, proj.githubBranch || 'main');
      const remoteContent = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, ''))));
      const remoteSha = fileData.sha;
      const relPath = dir ? item.path.slice(dir.length) : item.path;
      const parts = relPath.split('/');
      const fileName = parts.pop().replace(/\.(md|txt)$/i, '');
      const folder = parts.join('/');
      const existing = files.find(f => f.projectId === currentProjectId && f.githubPath === item.path);
      if (existing) {
        if (existing.githubSha === remoteSha) { skipped++; continue; }
        const ok = await confirm('文件有更新', `「${existing.name}」远端有更新，覆盖本地？`, '覆盖');
        if (!ok) { skipped++; continue; }
        existing.content = remoteContent; existing.githubSha = remoteSha; existing.updatedAt = ts();
        await dbPut('files', existing);
        updated++;
      } else {
        const f = { id: uuid(), name: fileName, content: remoteContent, folder, githubPath: item.path, githubSha: remoteSha, projectId: currentProjectId, createdAt: ts(), updatedAt: ts() };
        files.unshift(f);
        await dbPut('files', f);
        created++;
      }
      syncLog(`  ✓ ${relPath}`);
    }
    syncLog(`完成：新增 ${created}，更新 ${updated}，跳过 ${skipped}`);
    renderFiles();
  } catch (e) { syncLog('错误：' + e.message); }
  document.getElementById('btn-sync-pull').disabled = false;
  document.getElementById('btn-sync-push').disabled = false;
};

document.getElementById('btn-sync-push').onclick = async () => {
  const proj = projects.find(p => p.id === currentProjectId);
  if (!proj?.githubRepo || !proj?.githubPAT) { syncLog('请先在项目设置中配置 GitHub 信息'); return; }
  document.getElementById('btn-sync-pull').disabled = true;
  document.getElementById('btn-sync-push').disabled = true;
  syncLog('开始推送...');
  const branch = proj.githubBranch || 'main';
  const dir = proj.githubDir ? proj.githubDir + '/' : '';
  const projectFiles = files.filter(f => f.projectId === currentProjectId);
  let pushed = 0, failed = 0;
  try {
    for (const f of projectFiles) {
      const ext = /\.(md|txt)$/i.test(f.name) ? '' : '.md';
      const relPath = f.folder ? `${f.folder}/${f.name}${ext}` : `${f.name}${ext}`;
      const ghPath = dir + relPath;
      let sha = f.githubSha || null;
      if (!sha && f.githubPath) {
        try { const d = await ghGetFile(proj.githubPAT, proj.githubRepo, f.githubPath, branch); sha = d.sha; } catch {}
      }
      try {
        const newSha = await ghPutFile(proj.githubPAT, proj.githubRepo, f.githubPath || ghPath, f.content, sha, branch, `update ${f.name}`);
        f.githubPath = f.githubPath || ghPath;
        f.githubSha = newSha;
        f.updatedAt = ts();
        await dbPut('files', f);
        syncLog(`  ✓ ${relPath}`);
        pushed++;
      } catch (e) { syncLog(`  ✗ ${relPath}: ${e.message}`); failed++; }
    }
    syncLog(`完成：推送 ${pushed}，失败 ${failed}`);
  } catch (e) { syncLog('错误：' + e.message); }
  document.getElementById('btn-sync-pull').disabled = false;
  document.getElementById('btn-sync-push').disabled = false;
};

// ===== UTILS =====
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
async function copyText(text) {
  try { await navigator.clipboard.writeText(text); }
  catch { const t = document.createElement('textarea'); t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); }
}

(async () => {
  await openDB();
  await loadAll();
  if (projects.length > 0) enterProject(projects[0].id);
  else openProjectEditor(null);
  renderCurrentModel();
})();
